<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مغامرة سعد - النسخة الكاملة النهائية</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1b3022; font-family: sans-serif; }
        canvas { display: block; }
        #game-poster, #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; color: white; text-align: center; }
        #game-poster { background: linear-gradient(135deg, #1b3022 0%, #4B0082 100%); }
        #death-screen { background: rgba(200, 0, 0, 0.9); display: none; z-index: 3000; }
        .btn { background: #ffd700; color: #1b3022; border: none; padding: 15px 40px; font-size: 24px; font-weight: bold; border-radius: 50px; cursor: pointer; margin: 10px; transition: 0.2s; }
        .btn:hover { transform: scale(1.1); }
        #dialog-box { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: white; border: 4px solid #4B0082; padding: 20px; border-radius: 20px; width: 380px; text-align: center; display: none; z-index: 2000; color: #333; }
        #dialog-text { font-size: 20px; margin-bottom: 15px; font-weight: bold; }
        .choice-btn { background: #4B0082; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 12px; cursor: pointer; font-size: 16px; }
        #ui-header { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: #ffd700; background: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 50px; border: 2px solid #ffd700; z-index: 100; display: none; }
    </style>
</head>
<body>
    <div id="game-poster">
        <h1>مغامرة سعد</h1>
        <p>تصميم وإخراج ورسم وابداع : ليون</p>
        <button class="btn" onclick="startGame()">ابدأ المغامرة 🚀</button>
    </div>

    <video id="bg-video" loop muted playsinline style="display:none;">
        <source src="realx.mp4" type="video/mp4">
    </video>

    <div id="ui-header">المهمة: ابحث عن المفتاح 🗝️</div>
    <div id="dialog-box"><div id="dialog-text"></div><div id="choices"></div></div>
    
    <div id="death-screen">
        <h1>عيد اللعبة يا غبي! 💀</h1>
        <button class="btn" onclick="location.reload()">إعادة المحاولة</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // إعداد الأصوات بدقة
        const sounds = {
            masa2o: new Audio('masa2o.mp3'),
            meow: new Audio('meow.mp3'),
            teach: new Audio('teach.mp3'),
            mfta7_voice: new Audio('mfta7.mp3'),
            dzha: new Audio('dzha.mp3'),
            death: new Audio('death.mp3'),
            walk: new Audio('footstep.mp3'),
            hit: new Audio('hit.mp3'),
            pop: new Audio('pop.mp3'),
            victory: new Audio('victory.mp3')
        };

        sounds.walk.loop = true;
        sounds.walk.volume = 0.15;
        sounds.walk.playbackRate = 1.8;
        Object.values(sounds).forEach(s => { s.load(); s.volume = 0.8; });

        let gameRunning = false;
       function startGame() { 
    // إخفاء بوستر البداية
    document.getElementById('game-poster').style.display = 'none'; 
    // إظهار شريط المهام العلوي
    document.getElementById('ui-header').style.display = 'block';
    
    gameRunning = true; 
    
    // تشغيل فيديو الخلفية بصوت هادئ
    const bg = document.getElementById('bg-video'); 
    bg.muted = false; 
    bg.volume = 0.15; // خفضنا الصوت لـ 15% عشان تسمعين الأصوات الثانية بوضوح
    bg.play().catch(e => console.log("Video playback failed"));
}

        // إعداد الصور
        const assets = { 
            front: ['saad1.png', 'saad2.png'], 
            back: ['saadback1.png', 'saadback3.png'], 
            side: 'saad4.png', 
            layw: ['layw1.png', 'layw2.png', 'layw3.png'], 
            mfta7: 'mfta7.png', 
            knz: 'knz.png', 
            knzOpen: 'knzopen.png', 
            shok: 'shok.png', 
            party1: 'party1.png', 
            party2: 'party2.png' 
        };

        const imgs = { front: [], back: [], layw: [] };
        Object.keys(assets).forEach(k => {
            if(Array.isArray(assets[k])) assets[k].forEach(src => { let i = new Image(); i.src = src; imgs[k].push(i); });
            else { imgs[k] = new Image(); imgs[k].src = assets[k]; }
        });

        // حالة اللعبة
        let saad = { x: 50, y: 400, w: 60, h: 80, speed: 7, dir: 'front', frame: 0, flip: false, hasKey: false, won: false, dead: false, moveTimer: 0 };
        let layanChar = { x: 550, y: 150, w: 90, h: 120, frame: 0, timer: 0, dialogStep: 0 };
        let camera = { x: 0, y: 0 }; 
        let partyParticles = []; 
        let winScale = 0; 
        let isDialogActive = false;

        // الخريطة والعوائق
        const roads = [
            { x: 0, y: 350, w: 600, h: 180 }, { x: 500, y: 100, w: 160, h: 430 },
            { x: 500, y: 100, w: 1000, h: 160 }, { x: 1340, y: 100, w: 160, h: 800 },
            { x: 800, y: 740, w: 700, h: 160 }, { x: 800, y: 740, w: 160, h: 600 },
            { x: 500, y: 1200, w: 800, h: 180 }
        ];

        let worldObjects = [
            { type: 'mfta7', x: 1400, y: 780, w: 50, h: 50 },
            { type: 'shok', x: 800, y: 120, w: 60, h: 60 },
            { type: 'shok', x: 1380, y: 400, w: 60, h: 60 },
            { type: 'shok', x: 900, y: 1000, w: 60, h: 60 }
        ];

        let knzObj = { x: 650, y: 1220, w: 90, h: 90 };

        function showDialog(text, choices) {
            isDialogActive = true; 
            sounds.walk.pause(); 
            document.getElementById('dialog-text').innerText = text;
            const div = document.getElementById('choices'); 
            div.innerHTML = '';
            choices.forEach(c => { 
                let b = document.createElement('button'); 
                b.className = 'choice-btn'; 
                b.innerText = c.text; 
                b.onclick = c.action; 
                div.appendChild(b); 
            });
            document.getElementById('dialog-box').style.display = 'block';
        }

        function finishDialog() { 
            document.getElementById('dialog-box').style.display = 'none'; 
            isDialogActive = false; 
        }

        function nextDialog() {
            setTimeout(() => {
                sounds.teach.play();
                showDialog("تبي أعلمك وش تسوي الحين؟", [
                    { text: "إيوه", action: () => { 
                        sounds.mfta7_voice.play(); 
                        showDialog("لازم تدور المفتاح الذهبي وتفتح الكنز تحت!", [{ text: "تم", action: finishDialog }]); 
                    }},
                    { text: "لا", action: () => { 
                        sounds.dzha.play(); 
                        showDialog("أجل دز أمها!", [{ text: "باي", action: finishDialog }]); 
                    }}
                ]);
            }, 800);
        }

        const keys = {}; 
        window.onkeydown = e => keys[e.code] = true; 
        window.onkeyup = e => keys[e.code] = false;

        function update() {
            if (!gameRunning || saad.dead || saad.won || isDialogActive) { 
                sounds.walk.pause(); 
                return; 
            }

            let moving = false, nx = saad.x, ny = saad.y;
            if (keys['ArrowUp']) { ny -= saad.speed; saad.dir = 'back'; moving = true; }
            else if (keys['ArrowDown']) { ny += saad.speed; saad.dir = 'front'; moving = true; }
            else if (keys['ArrowLeft']) { nx -= saad.speed; saad.dir = 'side'; saad.flip = true; moving = true; }
            else if (keys['ArrowRight']) { nx += saad.speed; saad.dir = 'side'; saad.flip = false; moving = true; }

            if (moving) {
                if (sounds.walk.paused) sounds.walk.play().catch(e => {});
                saad.moveTimer++; 
                if (saad.moveTimer % 12 === 0) saad.frame = (saad.frame + 1) % 2;
                if (roads.some(r => (nx+30) >= r.x && (nx+30) <= r.x+r.w && (ny+70) >= r.y && (ny+70) <= r.y+r.h)) { 
                    saad.x = nx; saad.y = ny; 
                }
            } else { 
                sounds.walk.pause(); 
                saad.frame = 0; 
            }

            layanChar.timer++; 
            if (layanChar.timer % 15 === 0) layanChar.frame = (layanChar.frame + 1) % imgs.layw.length;
            
            // منطق المحادثة
            let dist = Math.hypot(saad.x - layanChar.x, saad.y - layanChar.y);
            if (dist < 120 && layanChar.dialogStep === 0) {
                sounds.masa2o.play();
                showDialog("مسائو سعودي!", [
                    { text: "مسائو", action: nextDialog },
                    { text: "مسائو يا قطوة", action: () => { sounds.meow.play(); nextDialog(); } }
                ]);
                layanChar.dialogStep = 1;
            }

            // التصادم مع الشوك والمفتاح
            worldObjects.forEach(obj => {
                if (Math.hypot((saad.x+30)-(obj.x+25), (saad.y+40)-(obj.y+25)) < 45) {
                    if (obj.type === 'shok') { 
                        saad.dead = true; 
                        sounds.hit.play(); 
                        sounds.death.play(); 
                        document.getElementById('death-screen').style.display = 'flex'; 
                    }
                    if (obj.type === 'mfta7' && !saad.hasKey) { 
                        saad.hasKey = true; 
                        document.getElementById('ui-header').innerText = "أخذت المفتاح! انزل تحت للكنز 📦"; 
                    }
                }
            });

            // فتح الكنز
            // البحث عن هذا الجزء داخل دالة update واستبداله
if (Math.hypot((saad.x + 30) - (knzObj.x + 45), (saad.y + 40) - (knzObj.y + 45)) < 45 && saad.hasKey && !saad.won) {
    // تشغيل أصوات الاحتفالية فوراً
    sounds.victory.play().catch(e => console.log("Victory Sound Error")); 
    sounds.pop.play().catch(e => console.log("Pop Sound Error")); 
    
    saad.won = true;
    
    // إنشاء جزيئات الاحتفال
    for(let i = 0; i < 80; i++) {
        partyParticles.push({ 
            x: knzObj.x + 45, y: knzObj.y + 45, 
            vx: (Math.random() - 0.5) * 15, 
            vy: (Math.random() - 1) * 12, 
            img: Math.random() > 0.5 ? imgs.party1 : imgs.party2, 
            size: Math.random() * 20 + 10 
        });
    }
}
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            if (!gameRunning) { requestAnimationFrame(draw); return; }
            ctx.save(); 
            ctx.translate(-camera.x, -camera.y);
            
            // رسم الطرق
            ctx.fillStyle = "#333"; 
            roads.forEach(r => ctx.fillRect(r.x, r.y, r.w, r.h));

            // رسم ليان
            if (imgs.layw[layanChar.frame]?.complete) {
                ctx.drawImage(imgs.layw[layanChar.frame], layanChar.x, layanChar.y, layanChar.w, layanChar.h);
            }

            // رسم المفتاح والشوك
            worldObjects.forEach(obj => { 
                if (obj.type === 'mfta7' && saad.hasKey) return; 
                if (imgs[obj.type]?.complete) ctx.drawImage(imgs[obj.type], obj.x, obj.y, obj.w, obj.h); 
            });

            // رسم سعد مع التحويل (Flip)
            let sImg = (saad.dir === 'side') ? imgs.side : imgs[saad.dir][saad.frame];
            if (sImg?.complete) { 
                ctx.save(); 
                if (saad.dir==='side' && saad.flip){
                    ctx.translate(saad.x+saad.w,saad.y);
                    ctx.scale(-1,1);
                    ctx.drawImage(sImg,0,0,saad.w,saad.h);
                } else {
                    ctx.drawImage(sImg,saad.x,saad.y,saad.w,saad.h);
                } 
                ctx.restore(); 
            }

            // رسم الكنز
            let kImg = saad.won ? imgs.knzOpen : imgs.knz;
            if (kImg?.complete) ctx.drawImage(kImg, knzObj.x, knzObj.y, knzObj.w, knzObj.h);

            // رسم جزيئات الاحتفال
            partyParticles.forEach(p => { 
                p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; 
                if(p.img.complete) ctx.drawImage(p.img, p.x, p.y, p.size, p.size); 
            });

            ctx.restore();

            // شاشة الفوز
            if (saad.won) { 
                if (winScale<1) winScale+=0.05; 
                ctx.save(); 
                ctx.fillStyle = "#ffd700"; 
                ctx.font = "bold 50px Arial"; 
                ctx.textAlign = "center"; 
                ctx.translate(canvas.width/2, canvas.height/2); 
                ctx.scale(winScale, winScale); 
                ctx.fillText("كل عام وأنت بخير سعودي 🎊", 0, 0); 
                ctx.restore(); 
            }
            update(); 
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', () => { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        });
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight; 
        draw();
    </script>
</body>
</html>
